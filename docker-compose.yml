# Banco de dados no Supabase (nuvem). O compose orquestra apenas
# Back-End e Front-End integrados.
services:
  backend:
    build:
      context: ./backend
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: production
      PORT: "3333"
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FRONTEND_URL: http://localhost:3000
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL}
      COOKIE_DOMAIN: localhost
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: http://localhost:3333/auth/google/callback
      YOUTUBE_REDIRECT_URI: http://localhost:3333/integrations/youtube/callback
      META_CLIENT_ID: ${META_CLIENT_ID}
      META_CLIENT_SECRET: ${META_CLIENT_SECRET}
      META_REDIRECT_URI: ${META_REDIRECT_URI}
      META_GRAPH_VERSION: v23.0
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3333
      API_INTERNAL_URL: http://backend:3333
      NEXT_PUBLIC_SUPABASE_URL: https://ivszwnhmvyrorbvjvgvt.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_6g3Iq9EDhmqrdiSeX9bdPA_QjR4AFTf
      NEXT_PUBLIC_USE_MOCK: "0"
    depends_on:
      - backend
    restart: unless-stopped
