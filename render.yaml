# Blueprint do Render para o BACKEND (Express). O frontend vai na Vercel.
services:
  - type: web
    name: midiakit-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: META_GRAPH_VERSION
        value: v23.0
      # Preencha os demais no painel do Render (Environment):
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: YOUTUBE_REDIRECT_URI
        sync: false
      - key: META_CLIENT_ID
        sync: false
      - key: META_CLIENT_SECRET
        sync: false
      - key: META_REDIRECT_URI
        sync: false
